name: Emulator Tests

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      run_optional:
        description: Run optional emulator tiers (conformance + dump)
        required: false
        default: "true"
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read

jobs:
  emu-required:
    name: Required Emulator Gate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install required packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            zlib1g-dev

      - name: Run required emulator tests
        run: ./run-tests.sh --profile emu-required

  emu-optional-conformance:
    name: Optional Conformance Tier
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_optional == 'true') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install required packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            zlib1g-dev \
            libvulkan-dev \
            mesa-vulkan-drivers \
            vulkan-tools

      - name: Run optional conformance tests
        run: ./run-tests.sh --profile emu-conformance

  emu-optional-dump:
    name: Optional Dump Replay Tier
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_optional == 'true') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dump replay dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            zlib1g-dev \
            libvulkan-dev \
            mesa-vulkan-drivers \
            vulkan-tools \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxss-dev \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libdrm-dev \
            libgbm-dev \
            libdecor-0-dev

      - name: Run optional dump replay tests
        run: ./run-dump-tests.sh --provision-validator
